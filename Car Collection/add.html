<!DOCTYPE html>
<html>
<head>
    <title>Add Car</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Add / Update Car</h1>

    <form id="carForm">
        <input type="text" id="name" placeholder="Car Name" required><br>
        <input type="text" id="model" placeholder="Model" required><br>
        <input type="text" id="color" placeholder="Color" required><br>
        <input type="text" id="image" placeholder="Image URL" required><br>
        <input type="number" id="rating" placeholder="Rating (1-5)" required><br>
        <input type="number" id="price" placeholder="Price" required><br>

        <button type="submit">Save Car</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
